name: hypot_news
description: HyPot-News — daily news briefing app
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Audio
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.21

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Images
  cached_network_image: ^3.3.1

  # Local storage
  hive_flutter: ^1.1.0

  # Subscriptions
  purchases_flutter: ^9.15.0

  
  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # HTTP
  dio: ^5.5.0
  flutter_dotenv: ^5.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env